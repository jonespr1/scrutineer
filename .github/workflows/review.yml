# Scrutineer - reusable AI pull-request reviewer.
#
# Self-contained: fetches the PR diff + prior review thread, sends it to your chosen
# model(s) in one call each, and posts the review(s) as PR comments. No agentic tool-loop,
# no vendor lock-in.
#
# CONFIGURE which model(s) review, via repo Variables:
#   REVIEWERS       Comma-separated list of reviewer "slots" (typically 1-3). Each slot is either:
#                     gemini                -> Google Gemini API direct (model = GEMINI_MODEL)
#                     gemini:<model>        -> Google Gemini API direct, specific model
#                     <openrouter-model-id> -> via OpenRouter, e.g. z-ai/glm-5.2 or
#                                              google/gemini-2.5-flash
#                   Default: "gemini, z-ai/glm-5.2, minimax/minimax-m3" (Flash + GLM + MiniMax).
#                   Multiple slots = independent, diverse second opinions. A repo overrides this
#                   (e.g. REVIEWERS = gemini for a Gemini-only repo with no OpenRouter key).
#                   Examples:
#                     REVIEWERS = gemini
#                     REVIEWERS = gemini, z-ai/glm-5.2
#                     REVIEWERS = google/gemini-2.5-flash, z-ai/glm-5.2
#   GEMINI_MODEL    Model for a bare "gemini" slot (default: gemini-flash-latest).
#
# OpenRouter routing controls (apply to every OpenRouter slot) - repo Variables:
#   OPENROUTER_HOSTS     Allow-list of host slugs. Default: "novita,fireworks,together,gmicloud"
#                        (non-Chinese, fp8) - the only way to guarantee jurisdiction/quality for
#                        open-weight models. With OPENROUTER_SORT (throughput by default) routing picks
#                        the fastest allowed host under OPENROUTER_MAXPRICE. Override per repo, pin one, or
#                        set to "any" to route to all hosts (e.g. for closed models like google/*).
#   OPENROUTER_SORT      throughput (default) | price | latency
#   OPENROUTER_MAXPRICE  hard $/1M ceiling "in,out" (a single value = both). Default "2,6" (fastest host
#                        under it). Premium models (anthropic/*, openai/*) exceed it - set "none" for those.
#   OPENROUTER_ZDR       zero-data-retention hosts only. Default: true. Set "false" to allow
#                        non-ZDR hosts (needed for models that have no ZDR host on OpenRouter).
#
# KEYS (repo Secrets; the caller passes exactly these two explicitly - not `secrets: inherit`):
#   GEMINI_API_KEY       for direct Gemini slots      (https://aistudio.google.com/)
#   OPENROUTER_API_KEY   for OpenRouter slots         (https://openrouter.ai/)
#
# By default OpenRouter requests set data_collection:"deny" AND zero data retention, so hosts
# neither train on nor retain your code. Set OPENROUTER_ZDR=false to relax retention if needed.
name: 'Scrutineer (reusable)'

on:
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: false
      OPENROUTER_API_KEY:
        required: false

# Serialise runs for one PR (so the de-dupe check below can't race) but NEVER cancel one:
# a cancelled run reads as "it didn't run" in the checks UI. Redundant triggers instead run,
# find the commit already reviewed, and exit 0 (green). Every trigger ends as a success.
concurrency:
  group: 'scrutineer-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: false

jobs:
  review:
    runs-on: 'ubuntu-latest'
    # Reviewers run in parallel, so wall-clock is the slowest single model call (per-call
    # ceilings are 300s OpenRouter / 240s Gemini) plus checkout - ~6 min worst case.
    timeout-minutes: 8
    permissions:
      contents: 'read'
      issues: 'read'
      pull-requests: 'write'
    steps:
      - name: 'Checkout (for optional .review/styleguide.md)'
        uses: 'actions/checkout@v4'
        with:
          persist-credentials: 'false'

      - name: 'Review'
        shell: 'bash'
        env:
          GH_TOKEN: '${{ github.token }}'
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
          OPENROUTER_API_KEY: '${{ secrets.OPENROUTER_API_KEY }}'
          REVIEWERS: '${{ vars.REVIEWERS }}'
          GEMINI_MODEL: '${{ vars.GEMINI_MODEL }}'
          OPENROUTER_HOSTS: '${{ vars.OPENROUTER_HOSTS }}'
          OPENROUTER_SORT: '${{ vars.OPENROUTER_SORT }}'
          OPENROUTER_MAXPRICE: '${{ vars.OPENROUTER_MAXPRICE }}'
          OPENROUTER_ZDR: '${{ vars.OPENROUTER_ZDR }}'
          CONTEXT_BUDGET: '${{ vars.CONTEXT_BUDGET }}'
          REPO: '${{ github.repository }}'
          PR_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
          COMMENT_BODY: '${{ github.event.comment.body }}'
          HEAD_SHA: '${{ github.event.pull_request.head.sha }}'
        run: |
          set -euo pipefail

          if [ -z "${PR_NUMBER:-}" ]; then echo "No PR number; nothing to review."; exit 0; fi

          # Resolve the PR head commit (pull_request provides it; issue_comment must fetch it).
          if [ -z "${HEAD_SHA:-}" ]; then
            HEAD_SHA="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.head.sha' 2>/dev/null || true)"
          fi
          SHORT_SHA="${HEAD_SHA:0:7}"

          # Fetch the comment thread once; reused for de-dupe and for re-review history.
          COMMENTS_JSON="$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --paginate 2>/dev/null | jq -s 'add // []' 2>/dev/null || echo '[]')"

          # 1) Diff (truncate on a line boundary so we never send a half hunk).
          # Fetch via the API, NOT `gh pr diff`: on issue_comment (@review) events the workspace only
          # has the base branch checked out, so `gh pr diff` diffs against local git that lacks the PR
          # commits and returns EMPTY -> the review silently no-ops. `gh api ... Accept: diff` always
          # uses the API, so @review works the same as a push. Retry, then fail loudly (never a silent
          # "empty -> exit 0") so a real fetch failure shows red instead of doing nothing.
          DIFF=""; drc=1
          for da in 1 2 3; do
            if DIFF="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" -H "Accept: application/vnd.github.v3.diff" 2>/dev/null)"; then
              drc=0; break
            else
              drc=$?; echo "diff fetch attempt $da failed (rc=$drc)"; [ "$da" -lt 3 ] && sleep $((da*5))
            fi
          done
          if [ "$drc" -ne 0 ]; then
            echo "::error::Could not fetch the PR diff after 3 attempts (GitHub API degraded?). Failing rather than silently posting nothing."
            exit 1
          fi
          if [ -z "$DIFF" ]; then echo "Empty diff; nothing to review."; exit 0; fi
          MAX=200000
          TRUNC_NOTE=""
          if [ "${#DIFF}" -gt "$MAX" ]; then
            DIFF="${DIFF:0:$MAX}"; DIFF="${DIFF%$'\n'*}"
            TRUNC_NOTE="$(printf '\n\n> Note: diff truncated at a line boundary; only the first part was reviewed.')"
          fi

          # 1b) Full current content of the changed files (largest change first) so the model can
          #     reason beyond the diff hunks - callers, helpers, error/fallback paths, and how a value
          #     set in one place is used elsewhere. Budget-bounded; text files only.
          # Both Gemini and GLM have ~1M-token context, so this budget is a cost/latency guard, not a
          # context limit - the default comfortably fits every changed file in a normal PR. Set the
          # CONTEXT_BUDGET repo Variable to raise or lower it.
          CONTEXT_BUDGET="${CONTEXT_BUDGET:-600000}"
          [[ "$CONTEXT_BUDGET" =~ ^[0-9]+$ ]] || CONTEXT_BUDGET=600000   # ignore a non-numeric override
          FILES_CTX=""; used=0
          CHANGED_JSON="$(gh api "repos/${REPO}/pulls/${PR_NUMBER}/files" --paginate 2>/dev/null | jq -s 'add // []' 2>/dev/null || echo '[]')"
          mapfile -t CHANGED < <(printf '%s' "$CHANGED_JSON" | jq -r 'sort_by(-.changes)[] | select(.status != "removed") | .filename' 2>/dev/null || true)
          for f in "${CHANGED[@]:-}"; do
            [ -z "$f" ] && continue
            case "$f" in *.png|*.jpg|*.jpeg|*.gif|*.ico|*.svg|*.pdf|*.zip|*.gz|*.tar|*.woff|*.woff2|*.ttf|*.eot|*.mp3|*.mp4|*.wav|*.lock|*.min.js|*.min.css) continue ;; esac
            # URL-encode the path (preserving slashes) so paths with spaces resolve; strip any invalid
            # UTF-8 (a binary file with an unlisted extension) so it can never break the JSON encode.
            f_enc="$(printf '%s' "$f" | jq -sRr @uri | sed 's/%2F/\//g')"
            content="$(gh api "repos/${REPO}/contents/${f_enc}?ref=${HEAD_SHA}" --jq '.content' 2>/dev/null | base64 -d 2>/dev/null | iconv -c -f utf-8 -t utf-8 2>/dev/null || true)"
            [ -z "$content" ] && continue
            block="$(printf '\n\n===== FILE: %s (full current content) =====\n%s\n' "$f" "$content")"
            # Over budget: skip this file but keep trying smaller ones (files are largest-first), and
            # add the "omitted" note only once.
            if [ $(( used + ${#block} )) -gt "$CONTEXT_BUDGET" ]; then
              [ -z "${OMIT_NOTE:-}" ] && { FILES_CTX="${FILES_CTX}$(printf '\n\n> Note: some changed files were omitted from the context to stay within budget.')"; OMIT_NOTE=1; }
              continue
            fi
            FILES_CTX="${FILES_CTX}${block}"; used=$(( used + ${#block} ))
          done

          # 2) Optional per-repo style guide.
          STYLE=""
          [ -f .review/styleguide.md ] && STYLE="$(cat .review/styleguide.md)"

          # 3) Prior conversation (our reviews + human replies) for context-aware re-reviews.
          HISTORY="$(printf '%s' "$COMMENTS_JSON" | jq -r '
              map(select((.body | startswith("## 🤖 Review")) or (.user.type == "User")))
              | map(if (.body | startswith("## 🤖 Review"))
                    then "### Your previous review:\n" + .body
                    else "### Developer response (" + .user.login + "):\n" + .body end)
              | join("\n\n---\n\n")' 2>/dev/null || true)"
          if [ "${#HISTORY}" -gt 20000 ]; then HISTORY="${HISTORY: -20000}"; fi

          # 4) Build the prompt.
          INSTRUCTIONS="$(printf '%s\n' \
            'You are a senior software engineer acting as a second reviewer on a GitHub pull request.' \
            'You are given the unified diff AND the full current content of the changed files. Use the full' \
            'files to reason about code the diff does not show: callers, helpers, error-handling and fallback' \
            'paths, and how a value written in one place is used elsewhere.' \
            'Write a concise, high-signal review in GitHub markdown.' \
            '' \
            'Use these sections (omit a severity bucket if it has no items):' \
            '## 📋 Summary - 2-3 sentences on what the PR does and its overall quality.' \
            '## 🔍 Findings - bullets grouped as 🔴 Critical, 🟠 High, 🟡 Medium, 🟢 Low.' \
            '  For each finding cite the file and approximate line, and give a specific, actionable fix.' \
            '## ✅ Positives - briefly note anything done well.' \
            '' \
            'Focus on correctness, security, performance, error handling and missing tests. Pay particular' \
            'attention to: state that is written but never cleared or invalidated; default values that misbehave' \
            '(for example a -1 index that silently wraps to the last element in Python); callback or signal' \
            'wiring; and exception/fallback paths that return stale or wrong data.' \
            '' \
            'Report only issues you can tie to a specific line and whose concrete failure path you can state.' \
            'Before finalising, re-read each flagged line to confirm it really says what you claim and that the' \
            'surrounding code does not already handle it - do not invent problems. Reserve 🔴 Critical for a' \
            'demonstrable crash, data loss or security hole. If the change is trivial or looks good, say so plainly.')"
          REREVIEW="$(printf '%s\n' \
            'If a PRIOR CONVERSATION section appears below, this is a RE-REVIEW. Treat it as a continuing two-way conversation:' \
            '- Begin with a "## 🔄 Since last review" section: ✅ Resolved (now fixed), 🤝 Acknowledged (the developer gave a sound reason not to change something and you agree - do not raise it again), ⚠️ Still open.' \
            '- Do NOT repeat resolved or acknowledged items under Findings; only include new or still-unresolved issues.' \
            '- If you disagree with a developer response, keep it open and briefly explain why. Change your mind when the reasoning is sound.')"
          PROMPT="${INSTRUCTIONS}

          ${REREVIEW}"
          if [ -n "$STYLE" ]; then
            PROMPT="${PROMPT}

          Team style guide to enforce:
          ${STYLE}"
          fi
          if [ -n "$HISTORY" ]; then
            PROMPT="${PROMPT}

          PRIOR CONVERSATION (your earlier reviews and the developer's responses, oldest first):
          ${HISTORY}"
          fi
          PROMPT="${PROMPT}

          Current unified diff to review:
          ${DIFF}"
          if [ -n "$FILES_CTX" ]; then
            PROMPT="${PROMPT}

          Full current content of the changed files (for context beyond the diff):
          ${FILES_CTX}"
          fi

          # 5) Model callers. Each echoes the review text.
          call_gemini() {
            local model="$1" req resp text err http rc fr why pt ct timeout=240
            if [ -z "${GEMINI_API_KEY:-}" ]; then printf '⚠️ GEMINI_API_KEY is not set for this repo.'; return; fi
            # Build the request and send it via stdin, never argv: PROMPT can be hundreds of KB, which
            # would blow the OS single-argument limit (~128KB) if passed to jq --arg or curl -d.
            req="$(printf '%s' "$PROMPT" | jq -Rsc '{contents:[{parts:[{text:.}]}]}')"
            rc=0; resp="$(printf '%s' "$req" | curl -sS -m "$timeout" -w '\n__HTTP__%{http_code}' "https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_API_KEY}" -H 'Content-Type: application/json' --data-binary @-)" || rc=$?
            http=""; case "$resp" in *__HTTP__*) http="${resp##*__HTTP__}"; resp="${resp%__HTTP__*}"; resp="${resp%$'\n'}";; esac
            text="$(printf '%s' "$resp" | jq -r '.candidates[0].content.parts[0].text // empty' 2>/dev/null)"
            if [ -z "$text" ]; then
              # Report the actual cause, never a bare "no response".
              err="$(printf '%s' "$resp" | jq -r '.error.message // empty' 2>/dev/null)"
              fr="$(printf '%s' "$resp" | jq -r '.candidates[0].finishReason // .promptFeedback.blockReason // empty' 2>/dev/null)"
              if   [ "$rc" = 28 ];           then why="Gemini did not respond within ${timeout}s (the diff may be too large; try gemini-flash-latest or a smaller PR)"
              elif [ "$rc" != 0 ];           then why="could not reach the Gemini API (curl exit $rc)"
              elif [ -n "$err" ];            then why="Gemini API error${http:+ (HTTP $http)}: $err"
              elif [ "$fr" = "MAX_TOKENS" ]; then why="the model hit its output limit before finishing the review (finishReason=MAX_TOKENS)"
              elif [ -n "$fr" ];             then why="no review returned (finishReason=$fr - e.g. a SAFETY or RECITATION block)"
              elif [ -n "$http" ] && [ "$http" != 200 ]; then why="HTTP $http from the Gemini API"
              else                                why="empty response from the Gemini API (HTTP ${http:-unknown})"
              fi
              text="$(printf '⚠️ Could not generate review.\n\n```\n%s\n```' "$why")"
            fi
            # Telemetry -> temp file the caller reads (functions run in a subshell, so globals won't
            # propagate). Gemini has no USD in its response, so cost is left "na" (estimate from tokens).
            pt="$(printf '%s' "$resp" | jq -r '.usageMetadata.promptTokenCount // 0' 2>/dev/null || echo 0)"
            ct="$(printf '%s' "$resp" | jq -r '.usageMetadata.candidatesTokenCount // 0' 2>/dev/null || echo 0)"
            case "$pt" in ''|*[!0-9]*) pt=0 ;; esac; case "$ct" in ''|*[!0-9]*) ct=0 ;; esac
            [ -n "${SLOT_META:-}" ] && printf '%s %s na\n' "${pt:-0}" "${ct:-0}" > "$SLOT_META"
            printf '%s' "$text"
          }
          call_openrouter() {
            local model="$1" req resp text err base prov sort http rc fr why pt ct cost timeout=300 HOSTS MP
            if [ -z "${OPENROUTER_API_KEY:-}" ]; then printf '⚠️ OPENROUTER_API_KEY is not set for this repo.'; return; fi
            sort="${OPENROUTER_SORT:-throughput}"
            base="$(jq -n --arg s "$sort" '{data_collection:"deny", sort:$s, allow_fallbacks:true}')"
            HOSTS="${OPENROUTER_HOSTS:-novita,fireworks,together,gmicloud}"  # compliant (non-Chinese, fp8) default; throughput-sort picks the fastest allowed host under MAXPRICE
            case "$HOSTS" in any|all|'*') HOSTS="" ;; esac  # opt out of the allow-list (e.g. closed models like google/* routed via OpenRouter). NB: the env block always sets this var, so ':-' (not '-') + this keyword is how a repo disables the default.
            [ -n "$HOSTS" ] && base="$(printf '%s' "$base" | jq --arg l "$HOSTS" '. + {only:($l|split(",")|map(gsub("^ +| +$";"")))}')"
            # Zero data retention is ON by default; set OPENROUTER_ZDR=false to allow non-ZDR hosts.
            [ "${OPENROUTER_ZDR:-true}" != "false" ] && base="$(printf '%s' "$base" | jq '. + {zdr:true}')"
            # $/1M ceiling "in,out": with throughput sort this stops routing to a premium (fast but dear)
            # host. Default "2,6" (headroom over our models' ~$1.3/1M); set OPENROUTER_MAXPRICE=none to disable.
            MP="${OPENROUTER_MAXPRICE:-2,6}"
            case "$MP" in
              none|off|any)     MP="" ;;
              *[!0-9.,]*|,*|*,) echo "Ignoring malformed OPENROUTER_MAXPRICE='$MP' (want 'in' or 'in,out')."; MP="" ;;
            esac
            # A single value applies to both in and out (.[1]//.[0]) - avoids a null|tonumber crash under set -e.
            [ -n "$MP" ] && base="$(printf '%s' "$base" | jq --arg m "$MP" '. + ($m|split(",")|{max_price:{prompt:(.[0]|tonumber), completion:((.[1]//.[0])|tonumber)}})')"
            prov="$base"
            # Build the request and send it via stdin, never argv (see call_gemini): the prompt is far
            # larger than the OS single-argument limit once file context is included.
            req="$(printf '%s' "$PROMPT" | jq -Rsc --arg m "$model" --argjson prov "$prov" '{model:$m, messages:[{role:"user",content:.}], provider:$prov, usage:{include:true}}')"
            rc=0; resp="$(printf '%s' "$req" | curl -sS -m "$timeout" -w '\n__HTTP__%{http_code}' "https://openrouter.ai/api/v1/chat/completions" -H "Authorization: Bearer ${OPENROUTER_API_KEY}" -H 'Content-Type: application/json' -H 'HTTP-Referer: https://github.com' -H 'X-Title: Scrutineer' --data-binary @-)" || rc=$?
            http=""; case "$resp" in *__HTTP__*) http="${resp##*__HTTP__}"; resp="${resp%__HTTP__*}"; resp="${resp%$'\n'}";; esac
            text="$(printf '%s' "$resp" | jq -r '.choices[0].message.content // empty' 2>/dev/null)"
            if [ -z "$text" ]; then
              # Report the actual cause, never a bare "no response".
              err="$(printf '%s' "$resp" | jq -r '.error.message // empty' 2>/dev/null)"
              fr="$(printf '%s' "$resp" | jq -r '.choices[0].finish_reason // empty' 2>/dev/null)"
              if   [ "$rc" = 28 ];         then why="the model did not respond within ${timeout}s (raise OPENROUTER_MAXPRICE to allow faster hosts, or reduce the diff size / CONTEXT_BUDGET)"
              elif [ "$rc" != 0 ];         then why="could not reach OpenRouter (curl exit $rc)"
              elif [ -n "$err" ];          then why="OpenRouter error${http:+ (HTTP $http)}: $err"
              elif [ "$fr" = "length" ];   then why="the model hit its output limit before finishing the review (finish_reason=length)"
              elif [ -n "$fr" ];           then why="no review content returned (finish_reason=$fr, HTTP ${http:-unknown})"
              elif [ -n "$http" ] && [ "$http" != 200 ]; then why="HTTP $http from OpenRouter"
              else                              why="empty response from OpenRouter (HTTP ${http:-unknown}) - likely no host matched the current routing constraints (OPENROUTER_HOSTS / OPENROUTER_ZDR / OPENROUTER_MAXPRICE)"
              fi
              text="$(printf '⚠️ Could not generate review.\n\n```\n%s\n```' "$why")"
            fi
            # Telemetry: tokens + OpenRouter's real USD cost (usage.include:true above).
            pt="$(printf '%s' "$resp" | jq -r '.usage.prompt_tokens // 0' 2>/dev/null || echo 0)"
            ct="$(printf '%s' "$resp" | jq -r '.usage.completion_tokens // 0' 2>/dev/null || echo 0)"
            case "$pt" in ''|*[!0-9]*) pt=0 ;; esac; case "$ct" in ''|*[!0-9]*) ct=0 ;; esac
            cost="$(printf '%s' "$resp" | jq -r '.usage.cost // "na"' 2>/dev/null || echo na)"
            # Keep only a decimal number or the literal "na"; anything else (a malformed or hostile
            # provider value) must not reach the HTML comment marker in the posted review.
            [ "$cost" = na ] || case "$cost" in ''|*[!0-9.]*) cost=na ;; esac
            [ -n "${SLOT_META:-}" ] && printf '%s %s %s\n' "${pt:-0}" "${ct:-0}" "${cost:-na}" > "$SLOT_META"
            printf '%s' "$text"
          }
          post_review() {
            local body
            # The trailing HTML comment is invisible in the rendered review but lets a later run
            # detect that this slot already reviewed this exact commit (see already_reviewed).
            # Marker also carries per-review telemetry (latency, tokens, real cost) so a trial can be
            # aggregated straight from the PR comments - Gemini included (it is not in OpenRouter billing).
            body="$(printf '## 🤖 Review - `%s`\n\n%s%s\n\n<sub>Automated review - not a substitute for human review.</sub>\n<!-- scrutineer sha=%s lat=%ss in=%s out=%s cost=%s -->' "$1" "$2" "$TRUNC_NOTE" "${HEAD_SHA:-none}" "${3:-0}" "${4:-0}" "${5:-0}" "${6:-na}")"
            printf '%s' "$body" | gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file -
          }

          # De-dupe: has this slot already posted a SUCCESSFUL review for the current commit, with no
          # new developer activity since? If so, skip it. A bare repeat "@review" on an unchanged commit
          # is a no-op; a new commit (SHA changes) or a substantive reply (not just "@review") re-triggers.
          already_reviewed() {
            local label="$1"
            [ -z "${HEAD_SHA:-}" ] && return 1
            printf '%s' "$COMMENTS_JSON" | jq -e \
              --arg head "## 🤖 Review - \`$label\`" --arg sha "sha=$HEAD_SHA" '
              (map(select(.user.type=="Bot"
                          and (.body|contains($head))
                          and (.body|contains($sha))
                          and ((.body|contains("⚠️ Could not generate review"))|not))) | last) as $a
              | if $a==null then false
                else ([ .[] | select(.user.type=="User"
                          and (.created_at > $a.created_at)
                          and ((.body|ascii_downcase|gsub("^\\s+";"")|startswith("@review"))|not)) ] | length) == 0
                end' >/dev/null 2>&1
          }

          # A single reviewer slot: direct Gemini, or an OpenRouter model id.
          run_slot() {
            local spec="$1" model label text
            case "$spec" in
              gemini)   model="${GEMINI_MODEL:-gemini-flash-latest}"; label="$model" ;;
              gemini:*) model="${spec#gemini:}"; label="$model" ;;
              *)        model="$spec"; label="$spec (via OpenRouter)" ;;
            esac
            # Skip a slot whose key is not configured - silently (log only, no PR comment). This lets
            # the GLM+Flash default degrade cleanly on a repo that has only one of the two keys,
            # instead of posting a noisy "KEY is not set" comment on every review.
            case "$spec" in
              gemini|gemini:*) [ -z "${GEMINI_API_KEY:-}" ]     && { echo "Skip '$label': GEMINI_API_KEY not set."; return 0; } ;;
              *)               [ -z "${OPENROUTER_API_KEY:-}" ] && { echo "Skip '$label': OPENROUTER_API_KEY not set."; return 0; } ;;
            esac
            if already_reviewed "$label"; then
              echo "Skip: '$label' already reviewed ${SHORT_SHA:-?} with no new activity."
              return 0
            fi
            echo "Reviewer: $label"
            # Time the call and collect the slot's telemetry via a temp file (subshell-safe).
            local SLOT_META t0 t1 lat pt=0 ct=0 cost=na
            SLOT_META="$(mktemp)"; export SLOT_META; t0=$SECONDS
            case "$spec" in
              gemini|gemini:*) text="$(call_gemini "$model")" ;;
              *)               text="$(call_openrouter "$model")" ;;
            esac
            t1=$SECONDS; lat=$((t1 - t0))
            # read returns non-zero on a newline-less file even after assigning; guard it so the
            # slot's subshell can't die here under set -e before post_review runs.
            [ -s "$SLOT_META" ] && { read -r pt ct cost < "$SLOT_META" || true; }
            rm -f "$SLOT_META"; unset SLOT_META
            echo "  $label: ${lat}s, in=${pt} out=${ct} cost=${cost}"
            post_review "$label" "$text" "$lat" "$pt" "$ct" "$cost"
          }

          # 6) Decide which slot(s) to run. A comment "@review <arg>" filters which reviewers run:
          #      (nothing) / all / both  -> every configured reviewer
          #      <keyword>               -> reviewers whose model id contains <keyword> (case-insensitive)
          #    An unmatched keyword falls back to running all (never a silent no-op).
          #    On PR-open events COMMENT_BODY is empty, so all configured reviewers run.
          FILTER="$(printf '%s' "${COMMENT_BODY:-}" | grep -ioE '@review[[:space:]]+[[:alnum:]:_./-]+' | head -1 | sed -E 's/^@review[[:space:]]+//I' | tr '[:upper:]' '[:lower:]' || true)"
          case "$FILTER" in all|both|everyone) FILTER="" ;; esac

          IFS=',' read -ra SLOTS <<< "${REVIEWERS:-gemini, z-ai/glm-5.2, minimax/minimax-m3}"
          SELECTED=()
          for spec in "${SLOTS[@]}"; do
            spec="${spec//[[:space:]]/}"; [ -z "$spec" ] && continue
            if [ -n "$FILTER" ]; then
              lc="$(printf '%s' "$spec" | tr '[:upper:]' '[:lower:]')"
              case "$lc" in *"$FILTER"*) : ;; *) continue ;; esac
            fi
            SELECTED+=("$spec")
          done
          if [ "${#SELECTED[@]}" -eq 0 ]; then
            [ -n "$FILTER" ] && echo "Filter '$FILTER' matched no configured reviewer; running all."
            for spec in "${SLOTS[@]}"; do spec="${spec//[[:space:]]/}"; [ -z "$spec" ] && continue; SELECTED+=("$spec"); done
          fi

          # Run the selected slots in PARALLEL; wall-clock is the slowest single model, not the sum.
          pids=()
          for spec in "${SELECTED[@]}"; do run_slot "$spec" & pids+=("$!"); done
          for p in "${pids[@]}"; do wait "$p" || true; done
          echo "Done."
