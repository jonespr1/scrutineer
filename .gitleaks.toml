# Baseline gitleaks config for scrutineer.
# Extends the full default ruleset and allowlists ONLY test fixtures/mocks, where
# fake credentials live by design. Docs, source, config, and data stay fully
# scanned — a real key (including a Stripe *test* key) pasted into a README or app
# code is still caught. Specific verified historical false positives are pinned by
# fingerprint in .gitleaksignore.
#
# NB: gitleaks 8.24.x (what gitleaks-action runs) applies only a SINGLE root
# [allowlist] table; the [[allowlists]] array form is silently ignored (verified
# empirically 2026-07-14). No secret-regex allowlist here on purpose: a global
# regex (e.g. sk_test_) would blind-spot source, so allowlisting is path-scoped.
title = "scrutineer gitleaks baseline"

[extend]
useDefault = true

[allowlist]
description = "Test fixtures/mocks use fake credentials by design (docs/source/config/data stay scanned)."
paths = [
  '''.*\.test\.[tj]sx?$''',
  '''.*\.spec\.[tj]sx?$''',
  '''(^|/)__tests__/.*''',
  '''(^|/)__mocks__/.*''',
  '''(^|/)tests?/fixtures/.*''',
  '''.*\.Tests\.ps1$''',
]
